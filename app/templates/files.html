{% extends "base.html" %}  {# or however your template inherits #}

{% block content %}
<h2>Uploaded Images</h2>
<div class="image-grid">
    {% for image in images %}
    <div class="image-item">
        <img src="{{ url_for('get_image', filename=image) }}" alt="{{ image }}">
        <p>{{ image }}</p>
    </div>
    {% endfor %}
</div>

<style>
.image-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1rem;
    padding: 1rem;
}
.image-item img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    border-radius: 8px;
}
</style>
{% endblock %}
